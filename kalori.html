<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalori Hesaplama | FitAnaliz</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .input-group { margin-bottom: 15px; text-align: left; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    .custom-field {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--input-border);
      border-radius: 10px;
      background: var(--card-bg);
      color: var(--text-color);
      font-size: 1rem;
    }
    .activity-box {
      margin: 20px 0;
      padding: 20px;
      background: rgba(0, 209, 178, 0.05);
      border-radius: 15px;
      border: 1px solid rgba(0, 209, 178, 0.2);
    }
    .activity-box h2 { 
      font-size: 1.1rem; 
      margin-bottom: 15px; 
      color: var(--primary-teal); 
      border: none; 
    }
    .result-display {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: var(--dark-panel);
      color: white;
      text-align: center;
      min-height: 50px;
    }
  </style>
</head>
<body>

  <header class="top-nav" style="background: var(--dark-panel); padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05);">
  <a href="index.html" class="logo" style="display: flex; align-items: center; text-decoration: none; gap: 18px;">
    <svg width="55" height="55" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M30 25V50" stroke="var(--primary-teal)" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="30" cy="25" r="3.5" stroke="var(--primary-teal)" stroke-width="2"/>
      <path d="M12 25H48" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M22 50H38" stroke="var(--primary-teal)" stroke-width="3" stroke-linecap="round"/>
      <g opacity="0.9">
        <rect x="18" y="15" width="4" height="20" rx="1.5" fill="white"/>
        <rect x="11" y="18" width="3" height="14" rx="1.5" fill="var(--primary-teal)"/>
      </g>
      <g opacity="0.9">
        <rect x="38" y="15" width="4" height="20" rx="1.5" fill="white"/>
        <rect x="46" y="18" width="3" height="14" rx="1.5" fill="var(--primary-teal)"/>
      </g>
    </svg>

    <div style="display: flex; flex-direction: column; line-height: 0.85;">
      <span style="color: white; font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; font-family: sans-serif;">MAKRO</span>
      <span style="color: var(--primary-teal); font-weight: 300; font-size: 1.4rem; letter-spacing: 5.5px; margin-top: 2px; font-family: sans-serif;">LIBRA</span>
    </div>
  </a>

  <nav class="nav-links" style="display: flex; align-items: center; gap: 20px;">
    <a href="bki.html" style="color: white; text-decoration: none; font-size: 0.95rem; opacity: 0.8;">BKİ</a>
    <a href="kalori.html" style="color: white; text-decoration: none; font-size: 0.95rem; opacity: 0.8;">Kalori</a>
    <a href="besin.html" style="color: white; text-decoration: none; font-size: 0.95rem; opacity: 0.8;">Besin</a>
    <a href="iletisim.html" style="color: white; text-decoration: none; font-size: 0.95rem; opacity: 0.8;">İletişim</a>
    <a href="giris.html" style="color: var(--primary-teal); text-decoration: none; font-weight: bold; border: 2px solid var(--primary-teal); padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; transition: 0.3s;" onmouseover="this.style.background='var(--primary-teal)'; this.style.color='white';" onmouseout="this.style.background='transparent'; this.style.color='var(--primary-teal)';">Giriş Yap</a>
  </nav>
</header>

  <main class="main-container">
    <h1>Günlük Kalori İhtiyacı</h1>
    <p style="text-align: center; margin-bottom: 25px;">Hedeflerinize ulaşmak için yakmanız gereken günlük enerjiyi öğrenin.</p>

    <div class="calculator-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label for="yas">Yaş</label>
                <input type="number" id="yas" class="custom-field" placeholder="Örn: 25">
            </div>
            <div class="input-group">
                <label for="cinsiyet">Cinsiyet</label>
                <select id="cinsiyet" class="custom-field">
                    <option value="kadin">Kadın</option>
                    <option value="erkek">Erkek</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label for="kiloKalori">Kilo (kg)</label>
                <input type="number" id="kiloKalori" class="custom-field" placeholder="Örn: 70">
            </div>
            <div class="input-group">
                <label for="boyKalori">Boy (cm)</label>
                <input type="number" id="boyKalori" class="custom-field" placeholder="Örn: 175">
            </div>
        </div>

        <div class="activity-box">
            <h2>Aktivite Seviyesi</h2>
            <div class="input-group">
                <label for="activityLevel">Genel Yaşam Biçimi</label>
                <select id="activityLevel" class="custom-field">
                    <option value="1.2">Hareketsiz (Masa başı)</option>
                    <option value="1.375">Az Aktif (Haftada 1–2 gün spor)</option>
                    <option value="1.55">Orta Aktif (Haftada 3–4 gün spor)</option>
                    <option value="1.725">Aktif (Haftada 5+ gün spor)</option>
                    <option value="1.9">Çok Aktif (Profesyonel/Yoğun)</option>
                </select>
            </div>
            
            <div class="input-group" style="margin-bottom: 0;">
                <label for="sportType">Spor Türü (Analiz İçin)</label>
                <select id="sportType" class="custom-field">
                    <option value="yok">Düzenli Spor Yapmıyorum</option>
                    <option value="fitness">Fitness / Ağırlık</option>
                    <option value="kardiyo">Kardiyo / Koşu</option>
                    <option value="pilates">Pilates / Yoga</option>
                    <option value="hiit">HIIT / Crossfit</option>
                </select>
            </div>
        </div>



        <button onclick="hesaplaKalori()" class="btn-main" style="width: 100%; border: none; cursor: pointer;">Hesapla</button>

<div id="kaloriSonuc" class="result-display" style="display: flex; align-items: center; justify-content: center; min-height: 100px; margin-top: 20px; background: rgba(0,0,0,0.03); border-radius: 12px;">
    <span style="opacity: 0.9; font-size: 0.85rem; letter-spacing: 1px; color: #666;">
        SONUÇLAR BURADA GÖRÜNECEK...
    </span>
</div>


       

    <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
</main>

  <script src="script.js"></script>
</body>
</html>
