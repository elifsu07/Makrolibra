<script>

// Örnek: Verileri Firebase'e Kaydetme Fonksiyonu
function verileriBulutaKaydet(toplamKalori, toplamProtein, toplamKarbonhidrat) {
    const user = firebase.auth().currentUser;
    if (user) {
        db.collection("users").doc(user.uid).update({
            bugunAlinan: toplamKalori,
            proteinAlinan: toplamProtein,
            karbonhidratAlinan: toplamKarbonhidrat
        }).then(() => {
            console.log("Veriler başarıyla güncellendi!");
        });
    }
}
// Arşivleme fonksiyonunu güncelle
function arsivle() {
    const user = firebase.auth().currentUser;
    
    if (!user) {
        alert("Lütfen önce giriş yapın!");
        return;
    }

    // Mevcut sayfadaki toplam değerleri al (senin değişken isimlerine göre güncelle)
    const toplamKcal = parseInt(document.getElementById('toplam-kalori').innerText);
    const toplamProtein = parseInt(document.getElementById('toplam-protein').innerText);
    const toplamKarbo = parseInt(document.getElementById('toplam-karbo').innerText);

    // Firebase'e yaz
    db.collection("users").doc(user.uid).update({
        bugunAlinan: toplamKcal,
        proteinAlinan: toplamProtein,
        karbonhidratAlinan: toplamKarbo,
        sonArsivleme: firebase.firestore.FieldValue.serverTimestamp()
    })
    .then(() => {
        // Başarı mesajı ve yönlendirme
        alert("Veriler başarıyla buluta yedeklendi! Panelinize yönlendiriliyorsunuz.");
        window.location.href = "dashboard.html";
          })
    .catch((error) => {
        console.error("Hata oluştu: ", error);
        alert("Bir hata oluştu, lütfen tekrar deneyin.");
    });
}
// Butona tıklandığında çalışacak kontrol
function premiumKontrol() {
    const user = firebase.auth().currentUser;
    
    db.collection("users").doc(user.uid).get().then((doc) => {
        if (doc.exists && doc.data().isPremium === true) {
            // Eğer premium ise veriyi kaydet
            arsivle();
        } else {
            // Değilse o hazırladığımız şık uyarıyı göster
            ozelAlert('Bu özellik profesyonel abonelik gerektirmektedir. Hemen 10 TL\'ye Premium\'a geçin!');
        }
    });
}
// besin.html içindeki toplamları güncelleyen fonksiyonun sonuna ekle
function dashboardVerileriniGuncelle() {
    const toplamKcal = document.getElementById('toplamCal').innerText;
    // Makro değerlerini de seçicilerine göre al (Örn: toplamProtein id'li elementin varsa)
    const toplamProtein = document.getElementById('toplamProtein')?.innerText || "0";
    const toplamKarbo = document.getElementById('toplamKarbo')?.innerText || "0";

    localStorage.setItem('bugunAlinanKcal', toplamKcal);
    localStorage.setItem('bugunAlinanProtein', toplamProtein);
    localStorage.setItem('bugunAlinanKarbo', toplamKarbo);
}
</script>
