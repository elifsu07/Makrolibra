  <main class="main-container">
    <h1>BKİ Hesaplama</h1>
    <p style="text-align: center; margin-bottom: 30px;">Boy ve kilo oranınızı hesaplayarak ideal kilonuzda olup olmadığınızı öğrenin.</p>

    <div class="calculator-card">
      <div class="input-group">
        <label for="kilo">Kilonuz (kg)</label>
        <input type="number" id="kilo" class="custom-input" placeholder="Örn: 75">
      </div>

      <div class="input-group">
        <label for="boy">Boyunuz (cm veya m)</label>
        <input type="number" id="boy" class="custom-input" placeholder="Örn: 175 veya 1.75" min="10" max="300">
      </div>

      <button onclick="hesaplaBKI()" class="btn-main" style="width: 100%; border: none; cursor: pointer; font-size: 1rem;">
        Hesapla
      </button>

      <div id="bkiSonuc" class="result-box">
        <span style="opacity: 0.9;">Sonuçlar burada görünecek...</span>
      </div>
    </div>

    

    <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
  </main>
